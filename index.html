<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇幻島嶼探險</title>
    <style>
        /* CSS 樣式區 - 控制外觀 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "微軟正黑體", sans-serif;
            overflow: hidden; /* 防止捲動 */
        }

        /* === 語言切換按鈕樣式 (右上角) === */
        #lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: auto;
            z-index: 100;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #lang-switch img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
        }

        #lang-switch:active {
            transform: scale(0.9);
        }

        /* === 0. 公司片頭動畫樣式 (影片版) === */
        #scene-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.0s ease-out;
        }

        /* 設定片頭影片的大小 */
        #intro-video {
            width: 100%;
            max-width: 800px;
            height: auto;
            object-fit: contain;
        }

        /* 隱藏用的設定 */
        .hidden {
            display: none !important;
        }

        /* === 1. 地圖頁面容器 (動態影片版) === */
        #scene-map {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* 保留圖片當作最底層保險 (防止黑畫面) */
            background-image: url('map.jpg'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* 地圖背景影片 (新增) */
        #map-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓影片填滿，不變形 */
            z-index: 0;        /* 放在最底層 */
        }

        /* 透明按鈕 (Hotspots) 設定 */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 10; /* ★重要：確保按鈕浮在影片上面 */
            
            background-color: transparent; /* 確保背景全透明 */
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            
            filter: drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.5));
            border-radius: 50%;
            tap-highlight-color: transparent;
            
            /* 呼吸動畫 */
            animation: breathe 2s infinite ease-in-out;
        }

        /* === 設定五個島嶼的感應位置 === */
        #btn-dragon { 
            top: 5%; left: 5%; width: 35%; height: 25%; 
            background-image: url('icon_dragon.png');
        }
        #btn-volcano { 
            top: 18%; right: 5%; width: 35%; height: 25%; 
            background-image: url('icon_volcano.png');
        }
        #btn-park { 
            top: 42%; left: 15%; width: 40%; height: 20%; 
            background-image: url('icon_park.png'); 
        }
        #btn-castle { 
            bottom: 25%; right: 0%; width: 30%; height: 20%; 
            background-image: url('icon_castle.png');
        }
        #btn-temple { 
            bottom: 0%; left: 0%; width: 55%; height: 40%; 
            background-image: url('icon_temple.png');
        }

        /* === 2. 過場影片播放容器 === */
        #scene-video {
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 50; /* 確保它在最上層 */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        video {
            width: 100%;
            max-height: 100%;
        }

        /* === 3. 結果頁面容器 === */
        #scene-result {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        /* 結果頁的循環背景影片 */
        #result-bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0; /* 放在最底層 */
        }

        /* 圖片按鈕容器 */
        .img-btn-container {
            position: relative;
            z-index: 10; /* 放在比影片高的層級 */
            display: block;
            width: 60%;
            max-width: 300px;
            margin: 10px auto;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            text-align: center;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .img-btn-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); 
        }

        .img-btn-container:hover { transform: scale(1.05); }
        .img-btn-container:active { transform: scale(0.95); }

        /* 呼吸動畫關鍵影格 */
        @keyframes breathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="scene-intro">
        <video id="intro-video" src="intro.mp4" muted autoplay playsinline></video>
        <div id="btn-enter" class="img-btn-container hidden" style="position:absolute; bottom:20%;">
             </div>
    </div>

    <div id="lang-switch" onclick="toggleLanguage()">
        <img id="img-lang" src="lang_to_en.png">
    </div>

    <div id="scene-map">
        <video id="map-video-bg" autoplay loop muted playsinline poster="map.jpg">
            <source src="map.mp4" type="video/mp4">
        </video>

        <div class="hotspot" id="btn-park" onclick="playScene('park')"></div>
        <div class="hotspot" id="btn-volcano" onclick="playScene('volcano')"></div>
        <div class="hotspot" id="btn-dragon" onclick="playScene('dragon')"></div>
        <div class="hotspot" id="btn-castle" onclick="playScene('castle')"></div>
        <div class="hotspot" id="btn-temple" onclick="playScene('temple')"></div>
    </div>

    <div id="scene-video" class="hidden">
        <video id="video-player" playsinline webkit-playsinline muted>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div id="scene-result" class="hidden">
        <video id="result-bg-video" loop muted playsinline></video>
        
        <div id="btn-start-game" class="img-btn-container" onclick="goToGame()">
            <img id="img-company" src="btn_company.png" alt="開始遊戲">
        </div>

        <div onclick="resetMap()" class="img-btn-container">
            <img id="img-back" src="btn_back.png" alt="回到地圖">
        </div>
    </div>

    <audio id="map-bgm" loop>
        <source src="bgm.mp3" type="audio/mp3">
    </audio>
    
    <script>
       // === 🏝️ 各島嶼的小遊戲網址設定 (路標系統) ===
       const gameLinks = {
           "dragon": "https://videodennischiu-oss.github.io/demon/", 
           "volcano": "https://videodennischiu-oss.github.io/lava/",
           "park": "https://videodennischiu-oss.github.io/HEAVEN/",
           "castle": "https://videodennischiu-oss.github.io/Castle-Treasure/", 
           "temple": "https://videodennischiu-oss.github.io/Lost-Chapter/" 
       };

       // === 🚀 跳轉功能 ===
       function goToGame() {
           const targetUrl = gameLinks[currentIsland];
           if (targetUrl && targetUrl !== "#") {
               window.location.href = targetUrl; // 原視窗跳轉
           } else {
               alert("這個島嶼的遊戲還在開發中！敬請期待！");
           }
       }

        // 取得 DOM 元素
        const mapScene = document.getElementById('scene-map');
        const videoScene = document.getElementById('scene-video');
        const resultScene = document.getElementById('scene-result');
        const videoPlayer = document.getElementById('video-player');
        
        // 用來記錄當前選的是哪個島
        let currentIsland = '';

        // 功能：開始播放某個島嶼的劇情 (雙軌播放無縫版)
        function playScene(islandName) {
            currentIsland = islandName;
            
            // 1. 畫面設定：
            mapScene.classList.add('hidden');       // 關掉地圖
            videoScene.classList.remove('hidden'); // 打開過場影片 (它在最上層)
            resultScene.classList.remove('hidden'); // 打開結果層 (讓它在下面偷偷跑)

            // --- A. 播放過場影片 (前景) ---
            const videoPath = `video_${islandName}.mp4`;
            videoPlayer.src = videoPath;
            videoPlayer.load();
            
            // 正常速度播放
            videoPlayer.play().then(() => {
                videoPlayer.playbackRate = 1.0; // 確保速度正常
            }).catch(e => {
                console.log("過場影片播放失敗", e);
                showResult(); // 失敗則直接顯示結果
            });

            // --- B. 同時播放背景循環影片 (背景) ---
            const bgVideo = document.getElementById('result-bg-video');
            if(bgVideo) {
                bgVideo.src = `loop_${islandName}.mp4`;
                bgVideo.play().catch(e => console.log("背景偷跑失敗", e));
            }
        }

        // 監聽：當過場影片播放結束時
        videoPlayer.onended = function() {
            showResult();
        };

        // 功能：顯示結果圖 (掀開蓋子版)
        function showResult() {
            // 只要把最上層的過場影片關掉，底下的循環影片就會露出來
            videoScene.classList.add('hidden');
        }

        // 功能：回到首頁地圖
        function resetMap() {
            resultScene.classList.add('hidden');
            videoScene.classList.add('hidden');
            mapScene.classList.remove('hidden');
            
            // 1. 清空過場劇情影片
            videoPlayer.src = "";
            
            // 2. 清空背景循環影片 (省電)
            const bgVideo = document.getElementById('result-bg-video');
            if(bgVideo) {
                bgVideo.pause();
                bgVideo.src = "";
            }
            currentIsland = '';

            // ★ 3. 確保地圖背景影片繼續播放 ★
            const mapBg = document.getElementById('map-video-bg');
            if(mapBg && mapBg.paused) {
                mapBg.play().catch(e => console.log("地圖背景恢復播放"));
            }
        }

        // === 片頭動畫控制區 (急速啟動版) ===
        document.addEventListener('DOMContentLoaded', function() {
            
            const introScene = document.getElementById('scene-intro');
            const introVideo = document.getElementById('intro-video');
            const enterBtn = document.getElementById('btn-enter'); 
            
            // 1. 嘗試播放片頭的函數
            function tryPlayIntro() {
                if (introVideo.readyState >= 3) {
                    introScene.classList.remove('hidden');
                    introVideo.play()
                        .then(() => console.log("片頭播放成功"))
                        .catch(e => {
                            if(enterBtn) enterBtn.classList.remove('hidden');
                        });
                } else {
                    introVideo.addEventListener('canplay', function() {
                        introScene.classList.remove('hidden');
                        introVideo.play().catch(e => {
                            if(enterBtn) enterBtn.classList.remove('hidden');
                        });
                    }, { once: true });
                }
            }

            // 執行嘗試
            tryPlayIntro();

            // 2. 綁定「進入按鈕」(萬一自動播放失敗)
            if(enterBtn) {
                enterBtn.addEventListener('click', function() {
                    enterBtn.classList.add('hidden');
                    introVideo.play();
                });
            }
            
            // 3. 關鍵：監聽片頭結束，強制進入地圖
            introVideo.onended = function() {
                console.log("片頭結束，進入地圖");
                introScene.classList.add('hidden');
                mapScene.classList.remove('hidden'); 
                
                // 嘗試啟動音樂
                const bgm = document.getElementById('map-bgm');
                if (bgm && bgm.paused) {
                    bgm.volume = 0.3;
                    bgm.play().catch(e => console.log("等待互動啟動音樂"));
                }
                
                // 確保地圖影片播放
                const mapBg = document.getElementById('map-video-bg');
                if(mapBg) mapBg.play().catch(e=>{});
            };
        });

        // === 語言切換控制 ===
        let currentLang = 'cn'; 
        function toggleLanguage() {
            const companyImg = document.getElementById('img-company');
            const langBtnImg = document.getElementById('img-lang'); 
            const backImg = document.getElementById('img-back');
            
            if (currentLang === 'cn') {
                currentLang = 'en';
                if(companyImg) companyImg.src = 'btn_company_en.png'; 
                if(langBtnImg) langBtnImg.src = 'lang_to_cn.png'; 
                if(backImg) backImg.src = 'btn_back_en.png';
            } else {
                currentLang = 'cn';
                if(companyImg) companyImg.src = 'btn_company.png'; 
                if(langBtnImg) langBtnImg.src = 'lang_to_en.png'; 
                if(backImg) backImg.src = 'btn_back.png';
            }

            // 切換五個島嶼的按鈕圖示
            const islands = ['dragon', 'volcano', 'park', 'castle', 'temple'];
            islands.forEach(name => {
                const btn = document.getElementById(`btn-${name}`);
                if(btn) {
                    if (currentLang === 'en') {
                        btn.style.backgroundImage = `url('icon_${name}_en.png')`;
                    } else {
                        btn.style.backgroundImage = `url('icon_${name}.png')`;
                    }
                }
            });
        }

        // === 音樂解鎖 (Safari 雙重保險版) ===
        function unlockAudio() {
            const bgm = document.getElementById('map-bgm');
            const mapBg = document.getElementById('map-video-bg');
            
            // 解鎖音樂
            if (bgm && bgm.paused) {
                bgm.volume = 0.3; 
                bgm.play().then(() => {
                    console.log("背景音樂啟動成功");
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                }).catch(e => {});
            }
            
            // 順便解鎖地圖影片(如果被擋)
            if(mapBg && mapBg.paused) {
                mapBg.play().catch(e=>{});
            }
        }
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);
    </script>
</body>
</html>
